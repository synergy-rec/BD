<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synergy BD — Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; background: #f7f6f3; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .box { background: #fff; border: 1px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 40px; width: 340px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.07); }
  .logo { font-size: 18px; font-weight: 600; color: #1a1a18; letter-spacing: -0.02em; margin-bottom: 6px; }
  .sub { font-size: 13px; color: #9e9b94; margin-bottom: 28px; }
  input { width: 100%; padding: 10px 14px; border: 1px solid rgba(0,0,0,0.18); border-radius: 7px; font-size: 14px; color: #1a1a18; background: #f7f6f3; outline: none; margin-bottom: 12px; }
  input:focus { border-color: #1a4f8a; background: #fff; }
  button { width: 100%; padding: 10px; background: #1a4f8a; color: #fff; border: none; border-radius: 7px; font-size: 14px; font-weight: 500; cursor: pointer; }
  button:hover { background: #163f6e; }
  .err { font-size: 12px; color: #b83232; margin-top: 10px; display: none; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">Synergy</div>
  <div class="sub">BD Lead Qualifier</div>
  <input type="password" id="pw" placeholder="Password" onkeydown="if(event.key==='Enter')check()" autofocus />
  <button onclick="check()">Enter</button>
  <div class="err" id="err">Incorrect password</div>
</div>
<script>
  const HASH = 'a7b9c2d4e6f8a1b3c5d7e9f0a2b4c6d8e0f2a4b6c8d0e2f4a6b8c0d2e4f6a8b0';

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function check() {
    const pw = document.getElementById('pw').value;
    const hash = await sha256(pw);
    const stored = localStorage.getItem('synergy_auth');
    if (stored === hash || hash === await sha256('ThisIsThePa55word!')) {
      localStorage.setItem('synergy_auth', hash);
      window.location.href = '/app.html';
    } else {
      document.getElementById('err').style.display = 'block';
      document.getElementById('pw').value = '';
    }
  }

  // Already authenticated?
  (async () => {
    const stored = localStorage.getItem('synergy_auth');
    const valid  = await sha256('ThisIsThePa55word!');
    if (stored === valid) window.location.href = '/app.html';
  })();
</script>
</body>
</html>
